        .controls {
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;

        .symbol-input {
            flex: 1;
            min-width: 200px;
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            transition: all 0.3s;

        .symbol-input:focus {
            outline: none;
            border-color: #2a5298;
            box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.1);
        }
        
        button {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            background: linear-gradient(135deg, #3a789c 0%, #358dc0 10%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .info-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 30px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .info-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            transition: transform 0.2s;
        }
        
        .info-card:hover {
            transform: translateY(-5px);
        }
        
        .info-label {
            font-size: 14px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        
        .info-value {
            font-size: 28px;
            font-weight: bold;
            color: #2a5298;
        }
        
        .positive {
            color: #28a745;
        }
        
        .negative {
            color: #dc3545;
        }
        
        .chart-container {
            padding: 30px;
            background: white;
        }
        
        #tv-chart-container {
            height: 600px;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2a5298;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .small-spinner {
            width: 20px;
            height: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 30px;
            text-align: center;
        }

    <script>
        let tradingViewWidget = null;
        const symbolsList = ['AAPL', 'MSFT', 'GOOGL', 'AMZN', 'TSLA', 'META', 'NFLX', 'NVDA'];
        
        function mostrarError(mensaje) {
            const errorDiv = document.getElementById('error-container');
            errorDiv.innerHTML = `<div class="error-message">❌ ${mensaje}</div>`;
            setTimeout(() => {
                errorDiv.innerHTML = '';
            }, 5000);
        }
        
        async function cargarDatos() {
            const symbol = document.getElementById('symbol-input').value.toUpperCase();
            
            // Mostrar loading
            document.getElementById('price').innerHTML = '<div class="loading-spinner"></div>';
            document.getElementById('change').textContent = 'Cargando...';
            document.getElementById('currency').textContent = '---';
            document.getElementById('company').textContent = 'Cargando...';
            document.getElementById('ath-price').innerHTML = '<div class="loading-spinner small-spinner"></div>';
            document.getElementById('ath-date').textContent = 'Cargando...';
            
            try {
                // 1. Petición para precio actual
                const quoteResponse = await fetch(`http://localhost:3001/api/quote/${symbol}`);
                
                if (!quoteResponse.ok) {
                    if (quoteResponse.status === 404) {
                        throw new Error(`Servidor no encontrado. ¿Estás ejecutando 'node server.js'?`);
                    }
                    throw new Error(`Error ${quoteResponse.status}: ${quoteResponse.statusText}`);
                }
                
                const quoteData = await quoteResponse.json();
                
                if (quoteData.error) {
                    throw new Error(quoteData.error);
                }
                
                // Actualizar información de precio actual
                document.getElementById('price').innerHTML = `${quoteData.regularMarketPrice} ${quoteData.currency}`;
                
                const changeElement = document.getElementById('change');
                const changeValue = quoteData.regularMarketChange;
                const changePercent = quoteData.regularMarketChangePercent;
                
                changeElement.innerHTML = `${changeValue > 0 ? '+' : ''}${changeValue.toFixed(2)} (${changePercent.toFixed(2)}%)`;
                changeElement.className = `info-value ${changeValue >= 0 ? 'positive' : 'negative'}`;
                
                document.getElementById('currency').textContent = quoteData.currency;
                document.getElementById('company').textContent = quoteData.longName || quoteData.symbol;
                
                // 2. Petición para máximo histórico
                const athResponse = await fetch(`http://localhost:3001/api/historical-high/${symbol}`);
                
                if (athResponse.ok) {
                    const athData = await athResponse.json();
                    
                    if (athData.allTimeHigh) {
                        const date = new Date(athData.date);
                        const formattedDate = date.toLocaleDateString('es-ES', { year: 'numeric', month: 'short', day: 'numeric' });
                        
                        document.getElementById('ath-price').innerHTML = `${athData.allTimeHigh.toFixed(2)} ${quoteData.currency}`;
                        document.getElementById('ath-date').innerHTML = `📅 ${formattedDate}`;
                    } else {
                        document.getElementById('ath-price').innerHTML = 'No disponible';
                        document.getElementById('ath-date').innerHTML = '';
                    }
                } else {
                    document.getElementById('ath-price').innerHTML = 'No disponible';
                    document.getElementById('ath-date').innerHTML = 'Endpoint no disponible';
                }
                
                // Actualizar gráfico
                actualizarGrafico(symbol);
                
            } catch (error) {
                console.error('Error:', error);
                mostrarError(error.message);
                document.getElementById('price').innerHTML = '❌ Error';
                document.getElementById('change').textContent = 'No disponible';
                document.getElementById('change').className = 'info-value';
                document.getElementById('currency').textContent = '---';
                document.getElementById('company').textContent = 'Error de conexión';
                document.getElementById('ath-price').innerHTML = 'Error';
                document.getElementById('ath-date').innerHTML = 'No disponible';
            }

            cargarHistorial()
            cargarNoticias()
        }
        
        function cargarDatosAleatorios() {
            const randomSymbol = symbolsList[Math.floor(Math.random() * symbolsList.length)];
            document.getElementById('symbol-input').value = randomSymbol;
            cargarDatos();
        }
        
        function actualizarGrafico(symbol) {
            const symbolMapping = {
                'AAPL': 'NASDAQ:AAPL',
                'MSFT': 'NASDAQ:MSFT',
                'GOOGL': 'NASDAQ:GOOGL',
                'AMZN': 'NASDAQ:AMZN',
                'TSLA': 'NASDAQ:TSLA',
                'META': 'NASDAQ:META',
                'NFLX': 'NASDAQ:NFLX',
                'NVDA': 'NASDAQ:NVDA'
            };
            
            const tvSymbol = symbolMapping[symbol] || `NASDAQ:${symbol}`;
            
            if (tradingViewWidget && typeof tradingViewWidget.symbol === 'function') {
                tradingViewWidget.symbol(tvSymbol);
            } else {
                if (tradingViewWidget && tradingViewWidget.remove) {
                    tradingViewWidget.remove();
                }
                tradingViewWidget = new TradingView.widget({
                    "container_id": "tv-chart-container",
                    "symbol": tvSymbol,
                    "interval": "D",
                    "timezone": "America/New_York",
                    "theme": "dark",
                    "style": "1",
                    "locale": "es",
                    "toolbar_bg": "#f1f3f6",
                    "autosize": true,
                    "allow_symbol_change": true,
                    "studies": ["RSI@tv-basicstudies", "MASI@tv-basicstudies"]
                });
            }
        }
        
        // Función para cargar el historial
async function cargarHistorial() {
    const symbol = document.getElementById('symbol-input').value.toUpperCase();
    const months = document.getElementById('months-select').value;
    const container = document.getElementById('history-table-container');
    
    container.innerHTML = '<div class="history-loading">🔄 Cargando historial...</div>';
    
    try {
        const response = await fetch(`http://localhost:3001/api/history/${symbol}/${months}`);
        
        if (!response.ok) {
            throw new Error(`Error ${response.status}`);
        }
        
        const data = await response.json();
        
        if (data.error) {
            throw new Error(data.error);
        }
        
        // Crear tabla
        let tableHTML = `
            <table class="history-table">
                <thead>
                    <tr><th>Fecha</th><th>Apertura</th><th>Máximo</th><th>Mínimo</th><th>Cierre</th><th>Volumen</th></tr>
                </thead>
                <tbody>
        `;
        
        for (const row of data.data.reverse()) { // Reverso para mostrar más reciente primero
            const change = ((row.close - row.open) / row.open * 100).toFixed(2);
            const changeClass = row.close >= row.open ? 'positive' : 'negative';
            
            tableHTML += `
                <tr>
                    <td>${row.date}</td>
                    <td>$${row.open.toFixed(2)}</td>
                    <td>$${row.high.toFixed(2)}</td>
                    <td>$${row.low.toFixed(2)}</td>
                    <td><strong>$${row.close.toFixed(2)}</strong></td>
                    <td>${(row.volume / 1000000).toFixed(1)}M</td>
                </tr>
            `;
        }
        
        tableHTML += `</tbody></table><p style="margin-top: 10px; font-size: 12px; color: #666;">📊 Mostrando ${data.count} días de los últimos ${months} meses</p>`;
        
        container.innerHTML = tableHTML;
        
    } catch (error) {
        console.error('Error cargando historial:', error);
        container.innerHTML = `<div class="error-message">❌ Error al cargar historial: ${error.message}</div>`;
    }
}

// Función para obtener noticias de una acción
async function cargarNoticias(symbol) {
    const newsContainer = document.getElementById('news-grid');
    const newsSymbolSpan = document.getElementById('news-symbol');
    
    newsSymbolSpan.textContent = `- ${symbol}`;
    newsContainer.innerHTML = '<div class="news-loading">🔄 Buscando noticias...</div>';
    
    try {
        // Usamos la API gratuita de GNews (no requiere API key para pruebas limitadas)
        // O también podemos usar una API alternativa
        const response = await fetch(`https://gnews.io/api/v4/search?q=${symbol}%20stock&lang=es&country=us&max=6&token=YOUR_API_KEY`);
        
        // Como GNews requiere API key, usamos una alternativa simulada o mostramos noticias de ejemplo
        // Para producción, regístrate gratis en https://gnews.io/ (100 requests/día gratis)
        
        // Por ahora, mostramos noticias de ejemplo hasta que tengas API key
        mostrarNoticiasEjemplo(symbol, newsContainer);
        
    } catch (error) {
        console.error('Error cargando noticias:', error);
        mostrarNoticiasEjemplo(symbol, newsContainer);
    }
}

// Función auxiliar para colores aleatorios
function getRandomColor() {
    const letters = '0123456789ABCDEF';
    let color = '';
    for (let i = 0; i < 6; i++) {
        color += letters[Math.floor(Math.random() * 16)];
    }
    return color;
}

    try {
        // Yahoo Finance tiene un endpoint de noticias no oficial
        const response = await fetch(`https://query1.finance.yahoo.com/v1/finance/search?q=${symbol}&newsCount=6`);
        const data = await response.json();
        
        if (data.news && data.news.length > 0) {
            let cardsHTML = '';
            
            for (const news of data.news.slice(0, 6)) {
                cardsHTML += `
                    <a href="${news.link}" class="news-card" target="_blank">
                        ${news.thumbnail ? `<img src="${news.thumbnail.resolutions[0].url}" class="news-image" alt="">` : `
                        <div class="news-image" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; font-size: 48px;">
                            📰
                        </div>`}
                        <div class="news-content">
                            <img src='news-image'>${news.image}</div>
                            <div class="news-title">${news.title}</div>
                            <div class="news-summary">${news.publisher}</div>
                            <div class="news-source">
                                <span>📌 ${news.provider}</span>
                                <span class="news-date">🕒 ${new Date(news.providerPublishTime * 1000).toLocaleDateString()}</span>
                            </div>
                        </div>
                    </a>
                `;
            }
            
            newsContainer.innerHTML = cardsHTML;
        } else {
            mostrarNoticiasEjemplo(symbol, newsContainer);
        }
        
    } catch (error) {
        console.error('Error cargando noticias reales:', error);
        mostrarNoticiasEjemplo(symbol, newsContainer);
    }
}
        window.addEventListener('load', () => {
            cargarDatos();
        });
    </script>
</body>
